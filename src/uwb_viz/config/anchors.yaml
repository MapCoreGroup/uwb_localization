# UWB Anchors Configuration (real robot positions)

fixed_frame: map
default_height: 0.02
default_color: [0.0, 0.6, 1.0, 0.35]

anchors:
  - name: anchor1
    frame_id: anchor1_frame
    xyz: [-0.225, 0.195, 0.0]
    topic: /uwb/anchor1/distance_m
    color: [0.9, 0.2, 0.0, 0.35]
  - name: anchor2
    frame_id: anchor2_frame
    xyz: [0.225, 0.195, 0.0]
    topic: /uwb/anchor2/distance_m
    color: [0.2, 0.9, 0.0, 0.35]
  - name: anchor3
    frame_id: anchor3_frame
    xyz: [-0.225, -0.195, 0.0]
    topic: /uwb/anchor3/distance_m
    color: [0.0, 0.2, 0.9, 0.35]
  - name: anchor4
    frame_id: anchor4_frame
    xyz: [0.225, -0.195, 0.0]
    topic: /uwb/anchor4/distance_m
    color: [0.9, 0.9, 0.2, 0.35]

rviz:
  grid: true
  axes: true
  markers: true
